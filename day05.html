<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB APPLICATION</title>
</head>
<body>
    <h2>JOB APPLICATION FORM</h2>
    <form>
        <fieldset>
            <legend>Personal Details</legend>
            <label>Full Name:</label><br>
            <input type="text" name="full name" required><br>
            <label>Email:</label>
            <input type="email" name="Email" required><br>
            <label>Phone Number:</label>
            <input type="tel" name="phoneno" required><br>
            <label>Date OF Birth:</label>
            <input type="date" name="dob">
        </fieldset>
        <fieldset>
            <legend>Job Details</legend>
            <label>Role:</label><br>
            <input type="text" name="role" required><br>
            <label>Years of Experience:</label>
            <input type="range" name="experience" min="0" max="10"><br>
            <label>Upload Resume:</label><br>
            <input type="file" name="resume" required><br>
        </fieldset>
            <br>
            <fieldset>
                <legend>Additional Details</legend>
                <label>Why should we hire you?</label>
                <textarea name="message" rows="5" cols="40" required></textarea>
                <label>Address:</label>
                <textarea name="address" rows="3" cols="40"></textarea>

            </fieldset>
        <br>
        <input type="submit" value="SUBMIT">
        <input type="reset" value="RESET">
        
    </form>
    
</body>
</html>
